[workspace]
authors = ["xinghao-zhang <xinghao.zhang@takeda.com>"]
channels = ["conda-forge"]
name = "biobridge"
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
numpy = ">=2.3.5,<3"
pandas = ">=2.3.3,<3"
pytorch = ">=2.9.1,<3"
fastmcp = ">=2.13.3,<3"
pathlib = ">=1.0.1,<2"
transformers = ">=4.57.3,<5"
scipy = ">=1.16.3,<2"
scikit-learn = ">=1.8.0,<2"
boto3 = ">=1.42.10,<2"

[pypi-dependencies]
python-dotenv = "*"
